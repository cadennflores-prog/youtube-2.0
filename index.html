<!DOCTYPE html>
<html>
<head>
    <title>Acoustic Data Processor</title> <style>
        body { background: #121212; color: #666; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .hub { background: #1a1a1a; padding: 20px; border-radius: 10px; width: 400px; margin: auto; border: 1px solid #333; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; background: #222; color: white; }
        button { padding: 10px; border-radius: 5px; border: none; cursor: pointer; background: #444; color: white; }

        /* The Search Results Overlay */
        #searchOverlay {
            display: none;
            position: fixed;
            top: 10%; left: 10%; width: 80%; height: 60%;
            background: #000; border: 2px solid #444; z-index: 999;
        }

        /* The Mini-Player Overlay */
        #playerOverlay {
            display: none;
            position: fixed;
            bottom: 10px; right: 10px; width: 300px; height: 120px;
            background: #000; border: 1px solid #ff0000; z-index: 1000;
        }

        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { background: red; color: white; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hub">
        <h3>Frequency Search Node</h3>
        <input type="text" id="searchInput" placeholder="Search Music Only...">
        <button onclick="openSearch()">Search</button>
    </div>

    <div id="searchOverlay">
        <button class="close-btn" onclick="closeSearch()">CLOSE RESULTS</button>
        <iframe id="searchFrame"></iframe>
    </div>

    <div id="playerOverlay">
        <iframe id="playerFrame"></iframe>
        <button class="close-btn" onclick="killMusic()">EMERGENCY MUTE</button>
    </div>

    <script>
        function openSearch() {
            let query = document.getElementById('searchInput').value;
            if (!query) return;

            // The 'sp' parameter forces YouTube into 'Music' mode
            let musicOnlyUrl = "https://www.youtube.com/results?search_query=" + encodeURIComponent(query) + "&sp=EgIQAQ%3D%3D";
            
            document.getElementById('searchFrame').src = musicOnlyUrl;
            document.getElementById('searchOverlay').style.display = "block";
        }

        function closeSearch() {
            document.getElementById('searchOverlay').style.display = "none";
            document.getElementById('searchFrame').src = "";
        }

        function killMusic() {
            document.getElementById('playerOverlay').style.display = "none";
            document.getElementById('playerFrame').src = "";
        }

        // Pro Tip: If you find a song in the search, copy its link 
        // and paste it here to play in the mini-player.
    </script>
</body>
</html>
