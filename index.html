<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Acoustic Frequency Research Lab</title> <style>
        body { background: #0f0f0f; color: #555; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 100px; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 350px; margin: auto; border: 1px solid #333; }
        
        input { width: 80%; padding: 10px; border: none; border-radius: 5px; background: #2a2a2a; color: #eee; margin-bottom: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .search-btn { background: #007bff; color: white; margin-bottom: 20px; }
        .mute-btn { background: #dc3545; color: white; width: 100%; display: none; }

        /* This makes the video frame super short so it only shows the play bar */
        #playerFrame { width: 100%; height: 80px; border-radius: 8px; border: none; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Audio Analysis Feed</h2>
        <p style="font-size: 12px;">Enter song name to begin stream</p>
        
        <input type="text" id="userInput" placeholder="Search for a song...">
        <button class="search-btn" onclick="searchMusic()">Search Music</button>
        
        <iframe id="playerFrame" src=""></iframe>
        <button id="muteBtn" class="mute-btn" onclick="emergencyStop()">Emergency Mute</button>
    </div>

    <script>
        function searchMusic() {
            let query = document.getElementById('userInput').value;
            if (!query) return;

            // This opens a new tab to YouTube Music so you can find the song easily
            // Once you find the song, you can paste the ID back here or just use the tab.
            let searchUrl = "https://music.youtube.com/search?q=" + encodeURIComponent(query);
            window.open(searchUrl, '_blank');
            
            // Note: If you want it to play DIRECTLY in the small box, 
            // you'll need the specific Video ID. 
        }

        function emergencyStop() {
            const frame = document.getElementById('playerFrame');
            const mute = document.getElementById('muteBtn');
            frame.src = "";
            frame.style.display = "none";
            mute.style.display = "none";
        }
    </script>
</body>
</html>
