<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bio-Tech Research Lab | Data Feed</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔬</text></svg>">

    <style>
        body { background: #f0f2f5; color: #2c3e50; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { background: #2c3e50; color: white; padding: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .main-hub { max-width: 500px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; border: 1px solid #dcdde1; }
        h2 { color: #2980b9; margin-top: 0; }
        
        .search-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        select, input, button { padding: 12px; border-radius: 6px; border: 1px solid #bdc3c7; font-size: 15px; }
        
        .execute-btn { background: #3498db; color: white; font-weight: bold; cursor: pointer; border: none; }
        .execute-btn:hover { background: #2980b9; }

        .status { margin-top: 30px; font-size: 11px; color: #95a5a6; }
    </style>
</head>
<body>

<header>Central Research Facility — Node: Laboratory 01</header>

<div class="main-hub">
    <h2>Secure Search Terminal</h2>
    <p style="font-size: 13px; color: #7f8c8d;">Syncing encrypted audio archives from Repository A & B.</p>
    
    <div class="search-container">
        <select id="platform">
            <option value="yt">Repository A (YouTube Music)</option>
            <option value="sp">Repository B (Spotify Catalog)</option>
        </select>
        
        <input type="text" id="queryInput" placeholder="Enter song name..." onkeydown="if(event.key==='Enter') startResearch()">
        <button class="execute-btn" onclick="startResearch()">INITIATE SEARCH</button>
    </div>

    <div class="status">
        SYSTEM STATUS: <span style="color: #27ae60;">ONLINE</span> | ENCRYPTION: <span style="color: #27ae60;">ACTIVE</span>
    </div>
</div>

<script>
function startResearch() {
    const platform = document.getElementById('platform').value;
    const query = document.getElementById('queryInput').value;

    if (!query) return;

    let url = "";

    if (platform === "yt") {
        // YouTube Search with Music Filter
        url = "https://www.youtube.com/results?search_query=" + encodeURIComponent(query) + "&sp=EgIQAQ%253D%253D";
    } else {
        // Spotify Search
        url = "https://open.spotify.com/search/" + encodeURIComponent(query);
    }

    // THE FIX: We open a 'Sidecar' window. 
    // This bypasses the 'Refused to Connect' error because it's not in an iframe.
    // It's a tiny window you can hide or move to the corner.
    window.open(url, 'ResearchWindow', 'width=500,height=700,top=100,left=100');

    // Clear input for stealth
    document.getElementById('queryInput').value = "";
}
</script>

</body>
</html>
