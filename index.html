<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bio-Tech Research Lab | Data Feed</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔬</text></svg>">

    <style>
        body { background: #f4f7f6; color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        header { background: #2c3e50; color: #ecf0f1; padding: 15px 30px; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .main-hub { max-width: 550px; margin: 80px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #dcdde1; text-align: center; }
        h2 { margin-top: 0; color: #2980b9; font-size: 22px; }
        p { font-size: 14px; color: #7f8c8d; margin-bottom: 30px; }

        .search-area { display: flex; flex-direction: column; gap: 10px; }
        select, input { padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; font-size: 15px; outline: none; }
        input:focus { border-color: #3498db; }
        
        .execute-btn { background: #3498db; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .execute-btn:hover { background: #2980b9; }

        /* THE INTEGRATED SEARCH OVERLAY */
        #researchOverlay {
            display: none;
            position: fixed;
            bottom: 20px; right: 20px;
            width: 350px; height: 450px; /* Taller to fit search results */
            background: #fff; border-radius: 10px; border: 2px solid #2c3e50;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3); z-index: 10000; overflow: hidden;
        }
        iframe { width: 100%; height: calc(100% - 35px); border: none; }
        .close-bar { background: #c0392b; color: white; padding: 8px; font-size: 10px; text-align: center; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>Central Research Facility — Node: Laboratory 01</header>

<div class="main-hub">
    <h2>Secure Search Terminal</h2>
    <p>Input query parameters to retrieve academic audio/visual archives from filtered repositories.</p>
    
    <div class="search-area">
        <select id="platform">
            <option value="yt">Repository A (YouTube - Music Filtered)</option>
            <option value="sp">Repository B (Spotify Catalog)</option>
        </select>
        
        <input type="text" id="queryInput" placeholder="Enter song or artist name..." onkeydown="if(event.key==='Enter') executeSearch()">
        <button class="execute-btn" onclick="executeSearch()">SEARCH ARCHIVE</button>
    </div>

    <div style="margin-top: 40px; font-size: 11px; color: #bdc3c7;">
        Status: <span style="color: #27ae60;">Connection Secure (AES-256)</span>
    </div>
</div>

<div id="researchOverlay">
    <div class="close-bar" onclick="closeOverlay()">TERMINATE CONNECTION</div>
    <iframe id="displayFrame"></iframe>
</div>

<script>
function executeSearch() {
    const platform = document.getElementById('platform').value;
    const query = document.getElementById('queryInput').value;
    const frame = document.getElementById('displayFrame');
    const overlay = document.getElementById('researchOverlay');

    if (!query) return;

    let searchUrl = "";

    if (platform === "yt") {
        // This searches YouTube but hides regular videos, focusing on music
        searchUrl = "https://www.youtube.com/results?search_query=" + encodeURIComponent(query) + "&sp=EgIQAQ%253D%253D";
    } else {
        // This searches the Spotify web player catalog
        searchUrl = "https://open.spotify.com/search/" + encodeURIComponent(query);
    }

    // Load the results in the window and show it
    frame.src = searchUrl;
    overlay.style.display = "block";
    
    // Clear input for stealth
    document.getElementById('queryInput').value = "";
}

function closeOverlay() {
    const frame = document.getElementById('displayFrame');
    const overlay = document.getElementById('researchOverlay');
    frame.src = "";
    overlay.style.display = "none";
}
</script>

</body>
</html>
